    <!--Hier sind input, output, um uns der benutzer einfacher eine Nachricht schreiben-->
    <section class="contact box_contact">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="miniHeader">Kontaktieren Sie uns</h2>

                </div>
            </div>
            <div class="row">
                <div class="col-lg-12">
                    <form name="sentMessage" id="contactForm" novalidate="">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <input type="text" class="form-control" placeholder="Ihre Name" id="name"
                                        required=""
                                        data-validation-required-message="Bitte schreiben Sie Ihre vollständige Name">
                                    <br>
                                </div>
                                <div class="form-group">
                                    <input type="email" class="form-control" placeholder="Ihre Emailadresse"
                                        id="emailadresse" required=""
                                        data-validation-required-message="Bitte schreiben Sie Ihre emailadresse.">
                                    <br>
                                </div>
                                <div class="form-group">
                                    <input type="tel" class="form-control" placeholder="Ihre Rufnummer" id="telNummer"
                                        required=""
                                        data-validation-required-message="Bitte schreiben Sie Ihre telefonnummer">
                                    <br>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <textarea class="form-control" placeholder="Ihre Nachricht*" id="nachricht"
                                        required="" style="height: 162px;"
                                        data-validation-required-message="Bitte schreiben Sie Ihre Nachricht"></textarea>

                                </div>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-primary btn_absenden">Absenden</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
